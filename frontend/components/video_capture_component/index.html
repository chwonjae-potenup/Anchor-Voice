<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KB Video Capture</title>
  <style>
    :root {
      --bg: #040913;
      --panel: #0f172a;
      --line: #334155;
      --text: #e2e8f0;
      --sub: #94a3b8;
      --accent: #22c55e;
      --warn: #f97316;
      --danger: #ef4444;
    }
    * {
      box-sizing: border-box;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%;
      max-width: 940px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }
    .video-shell {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4 / 3;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    .status {
      color: var(--sub);
      font-size: 13px;
      min-height: 20px;
    }
    .progress {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #1e293b;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #34d399, #22c55e);
      transition: width .08s linear;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 12px 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .65;
    }
    #recordBtn {
      background: var(--danger);
    }
    #resetBtn {
      background: #334155;
    }
    .hint {
      font-size: 12px;
      color: #93c5fd;
      background: #172554;
      border: 1px solid #1d4ed8;
      border-radius: 10px;
      padding: 8px 10px;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 8px;
      }
      .btn-row {
        flex-direction: column;
      }
      .video-shell {
        aspect-ratio: 3 / 4;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="video-shell">
      <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="status" class="status">카메라를 준비하는 중...</div>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <div class="btn-row">
      <button id="recordBtn" disabled>🎬 녹화 시작 (5초)</button>
      <button id="resetBtn">다시 촬영</button>
    </div>
    <div class="hint">녹화 후 자동으로 분석 단계로 넘어갑니다.</div>
  </div>

  <script>
    const streamlitBridge = {
      post(payload) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true }, payload),
          "*",
        );
      },
      setComponentValue(value) {
        streamlitBridge.post({
          type: "streamlit:setComponentValue",
          value: value,
        });
      },
      setFrameHeight(height) {
        streamlitBridge.post({
          type: "streamlit:setFrameHeight",
          height: Math.max(200, Number(height || 0)),
        });
      },
      ready() {
        streamlitBridge.post({
          type: "streamlit:componentReady",
          apiVersion: 1,
        });
      },
    };

    const state = {
      stream: null,
      capturing: false,
      args: { label: "녹화 시작 (5초)", duration_ms: 5000, fps: 8 },
    };

    const videoEl = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const barEl = document.getElementById("bar");
    const recordBtn = document.getElementById("recordBtn");
    const resetBtn = document.getElementById("resetBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setProgress(ratio) {
      const pct = Math.max(0, Math.min(100, ratio * 100));
      barEl.style.width = pct + "%";
    }

    function applyArgs(args) {
      state.args = {
        label: (args && args.label) || "녹화 시작 (5초)",
        duration_ms: Math.max(1000, Number((args && args.duration_ms) || 5000)),
        fps: Math.max(4, Math.min(20, Number((args && args.fps) || 8))),
      };
      recordBtn.textContent = `🎬 ${state.args.label}`;
    }

    async function ensureCamera() {
      if (state.stream) {
        return true;
      }
      try {
        state.stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 960 },
            height: { ideal: 720 },
            facingMode: "user"
          },
          audio: false,
        });
        videoEl.srcObject = state.stream;
        recordBtn.disabled = false;
        setStatus("준비 완료. 녹화 버튼을 눌러 동작을 수행해 주세요.");
        setProgress(0);
        return true;
      } catch (e) {
        setStatus("카메라 접근 실패: " + e.message);
        recordBtn.disabled = true;
        return false;
      }
    }

    function captureFrameBase64() {
      const w = videoEl.videoWidth || 640;
      const h = videoEl.videoHeight || 480;
      const maxSide = 640;
      const scale = Math.min(1, maxSide / Math.max(w, h));
      const targetW = Math.max(1, Math.round(w * scale));
      const targetH = Math.max(1, Math.round(h * scale));

      const canvas = document.createElement("canvas");
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(videoEl, 0, 0, targetW, targetH);
      return canvas.toDataURL("image/jpeg", 0.68).split(",")[1];
    }

    async function startCapture() {
      if (state.capturing) {
        return;
      }
      const ok = await ensureCamera();
      if (!ok) {
        return;
      }

      state.capturing = true;
      recordBtn.disabled = true;
      setProgress(0);
      setStatus("녹화 중... 안내된 동작을 순서대로 수행해 주세요.");

      const frames = [];
      const duration = state.args.duration_ms;
      const fps = state.args.fps;
      const frameInterval = 1000 / fps;
      const totalFrames = Math.max(6, Math.floor(duration / frameInterval));
      const startedAt = performance.now();

      for (let i = 0; i < totalFrames; i++) {
        frames.push(captureFrameBase64());
        setProgress((i + 1) / totalFrames);

        const elapsed = performance.now() - startedAt;
        const expected = (i + 1) * frameInterval;
        const wait = Math.max(0, expected - elapsed);
        await new Promise((resolve) => setTimeout(resolve, wait));
      }

      const payload = {
        capture_id: String(Date.now()),
        frames: frames,
      };

      setStatus("완료! 검증 단계로 이동합니다...");
      streamlitBridge.setComponentValue(payload);
      streamlitBridge.setFrameHeight(document.body.scrollHeight);

      state.capturing = false;
      recordBtn.disabled = false;
    }

    function resetCapture() {
      if (state.capturing) {
        return;
      }
      setProgress(0);
      setStatus("초기화됨. 다시 녹화해 주세요.");
      streamlitBridge.setComponentValue({
        capture_id: "",
        frames: [],
      });
    }

    function onRender(event) {
      const data = event && event.data ? event.data : {};
      if (!data || data.type !== "streamlit:render") {
        return;
      }
      applyArgs(data.args || {});
      streamlitBridge.setFrameHeight(document.body.scrollHeight);
      ensureCamera();
    }

    recordBtn.addEventListener("click", startCapture);
    resetBtn.addEventListener("click", resetCapture);

    window.addEventListener("message", onRender);
    streamlitBridge.ready();
    streamlitBridge.setFrameHeight(document.body.scrollHeight);
    ensureCamera();
  </script>
</body>
</html>
